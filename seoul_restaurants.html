<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fafafa">
<title>首尔美食 & 购物地图 - 45 家</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    background: #fff; border-bottom: 1px solid #ddd; z-index: 500;
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px; overflow-x: auto; white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  #topbar .tb-label { font-size: 12px; color: #888; margin-right: 4px; flex-shrink: 0; }
  .cat-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    border: 1.5px solid #ddd; background: #fff;
    font-size: 13px; cursor: pointer; user-select: none;
    transition: all 0.15s; flex-shrink: 0;
  }
  .cat-chip:hover { border-color: #999; }
  .cat-chip.active { color: white; border-color: transparent; }
  .cat-chip .cnt { font-size: 11px; opacity: 0.75; }
  .cat-chip.all { background: #333; color: white; border-color: #333; }
  .cat-chip.all.inactive { background: #fff; color: #333; border-color: #ddd; }
  .cat-chip .cat-img {
    width: 28px; height: 24px;
    object-fit: cover; object-position: center top;
    flex-shrink: 0; display: inline-block;
    border-radius: 4px;
  }

  #map { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; }
  #sidebar {
    /* sidebar DOM 在初始化后会被移到 #details-overlay 内; 这里给它在 overlay 内的样式 */
    width: 100%; max-width: 760px; margin: 0 auto;
    background: transparent; border: none; overflow: visible;
    box-sizing: border-box; padding: 14px 16px 60px;
  }
  /* 不再使用的旧按钮 / handle 一律隐藏 */
  #sidebar-toggle, #sheet-handle { display: none !important; }
  .sidebar-scroll { overflow: visible !important; max-height: none !important; }
  /* 旧 body.sidebar-hidden / sidebar-expanded 等状态不再生效 */
  body.sidebar-hidden #map, body.sidebar-expanded #map { right: 0 !important; }

  /* sheet drag handle (移动端可见, 桌面端隐藏) */
  #sheet-handle { display: none; }

  /* ===== iPhone / 移动端 ===== */
  @media (max-width: 768px), (pointer: coarse) and (max-width: 900px) {
    /* 顶部筛选条 */
    #topbar {
      right: 0;
      padding-top: env(safe-area-inset-top);
      height: calc(52px + env(safe-area-inset-top));
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #topbar::-webkit-scrollbar { display: none; }
    #topbar .tb-label { display: none; }
    .cat-chip { padding: 8px 14px; font-size: 14px; min-height: 36px; }

    /* 地图占满 */
    #map {
      top: calc(52px + env(safe-area-inset-top));
      right: 0; bottom: 0;
    }

    /* sidebar 在 overlay 内 = 移动端列表样式 */
    #sidebar { padding: 8px 12px 80px; }
    #sidebar h1 { font-size: 16px; padding-top: 4px; margin: 0 0 2px; }
    #sidebar .sub { font-size: 11px; margin-bottom: 8px; }
    #sidebar .legend { padding: 8px; margin-bottom: 10px; }
    #sidebar .item { padding: 10px 6px; min-height: 56px; }
    #sidebar .copy-btn { padding: 4px 10px; font-size: 13px; line-height: 18px; min-width: 36px; }
    #sidebar .group h3 { padding: 8px 0; font-size: 14px; min-height: 32px; }

    /* Leaflet 控件避让顶栏 + safe-area */
    .leaflet-top.leaflet-left { top: calc(env(safe-area-inset-top) + 8px) !important; }
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 12px; }
  .legend { background: #fff; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; border: 1px solid #eee; }
  .legend div { margin: 4px 0; display: flex; align-items: center; gap: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
  .star { font-size: 16px; }
  .group { margin-bottom: 14px; }
  .group h3 { font-size: 13px; margin: 0 0 6px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 4px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  .group h3::before { content: "▾"; font-size: 10px; color: #999; transition: transform .15s; display: inline-block; }
  .group.collapsed h3::before { transform: rotate(-90deg); }
  .group.collapsed .item { display: none !important; }
  .group h3 .gcount { margin-left: auto; font-size: 11px; color: #999; font-weight: normal; }
  .copy-btn { display: inline-block; margin-left: 6px; padding: 0 6px; font-size: 11px; line-height: 16px; background: #eee; border: none; border-radius: 3px; cursor: pointer; color: #666; vertical-align: middle; }
  .copy-btn:hover { background: #d0e6ff; color: #0066cc; }
  .copy-btn.copied { background: #c8f5c8; color: #1a7f1a; }
  .item { font-size: 12px; padding: 6px; cursor: pointer; border-radius: 4px; line-height: 1.4; display: flex; gap: 8px; align-items: center; }
  .item:hover { background: #eef5ff; }
  .item-thumb { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #ddd; }
  .item-text { flex: 1; min-width: 0; }
  .item .name { font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .item .desc { color: #777; font-size: 11px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  /* 自定义热门景区图标 (大星) */
  .hot-icon {
    background: #ff3b30; color: white; border-radius: 50%;
    width: 36px !important; height: 36px !important;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold;
    box-shadow: 0 0 0 3px rgba(255,59,48,0.3), 0 2px 6px rgba(0,0,0,0.3);
    border: 2px solid #fff;
  }
  /* 酒店图标 */
  .hotel-icon {
    background: linear-gradient(135deg, #2c3e50, #4a6fa5); color: white;
    border-radius: 8px;
    width: 40px !important; height: 40px !important;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 0 3px rgba(74,111,165,0.35), 0 3px 8px rgba(0,0,0,0.4);
    border: 2px solid #fff;
  }
  /* 南山塔图标 */
  .tower-icon {
    background: linear-gradient(135deg, #c0392b, #f39c12); color: white;
    border-radius: 50%;
    width: 44px !important; height: 44px !important;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 0 3px rgba(243,156,18,0.4), 0 3px 10px rgba(192,57,43,0.5);
    border: 2px solid #fff;
  }
  /* 餐厅小图标 */
  .rest-icon {
    border-radius: 50%; width: 28px !important; height: 28px !important;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 13px;
    border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    cursor: pointer;
  }

  /* hover 浮窗 */
  #tooltip {
    position: absolute; z-index: 9999; pointer-events: none;
    background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    width: 260px; padding: 0; display: none; overflow: hidden;
    border: 1px solid #eee;
    font-size: 12px;
  }
  #tooltip img { width: 100%; height: 180px; object-fit: cover; display: block; background:#eee; }
  #tooltip .tt-body { padding: 10px 12px; }
  #tooltip .tt-title { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  #tooltip .tt-area { color: #2a73d9; font-size: 11px; margin-bottom: 6px; }
  #tooltip .tt-desc { color: #444; font-size: 12px; line-height: 1.5; white-space: pre-line; }
  #tooltip .no-img { height: 60px; display: flex; align-items: center; justify-content: center; color: #aaa; background: #f5f5f5; font-size: 12px; }

  /* 点击弹窗也带图 */
  .leaflet-popup-content { margin: 0 !important; }
  .pop-card { width: 240px; }
  .pop-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
  .pop-card .pc-body { padding: 8px 12px 10px; }
  .pop-card .pc-title { font-weight: 700; font-size: 14px; }
  .pop-card .pc-area { color: #2a73d9; font-size: 11px; margin-bottom: 4px; }
  .pop-card .pc-desc { font-size: 12px; color: #444; line-height: 1.5; white-space: pre-line; }

  /* 大浮窗 modal */
  #modal-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 10000; display: none;
    align-items: center; justify-content: center;
    animation: fadein 0.18s ease;
  }
  #modal-mask.show { display: flex; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  #modal {
    background: #fff; border-radius: 12px; overflow: hidden;
    width: 90%; max-width: 720px; max-height: 90vh;
    display: flex; flex-direction: row;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    animation: pop 0.22s cubic-bezier(.2,1.3,.5,1);
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #modal .m-img-wrap {
    flex: 1 1 55%; background: #000;
    display: flex; align-items: center; justify-content: center;
    min-height: 320px; max-height: 90vh;
    position: relative;
  }
  #modal .m-img-wrap img { width: 100%; height: 100%; max-height: 90vh; object-fit: contain; display: block; }
  #modal .m-img-wrap .no-img-big {
    color: #888; font-size: 14px;
  }
  .m-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: #fff; border: none;
    font-size: 22px; line-height: 1; cursor: pointer; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; user-select: none;
  }
  .m-nav-btn:hover { background: rgba(0,0,0,0.85); }
  .m-nav-prev { left: 12px; }
  .m-nav-next { right: 12px; }
  .m-counter {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #fff;
    padding: 3px 12px; border-radius: 12px; font-size: 12px; z-index: 3;
    pointer-events: none;
  }
  #modal .m-body {
    flex: 1 1 45%; padding: 24px 22px; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  #modal .m-id {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    color: white; font-size: 12px; font-weight: 700;
    align-self: flex-start; margin-bottom: 10px;
  }
  #modal .m-title { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
  #modal .m-area { color: #2a73d9; font-size: 13px; margin-bottom: 4px; }
  #modal .m-short { color: #888; font-size: 13px; margin-bottom: 18px; }
  #modal .m-desc { color: #333; font-size: 14px; line-height: 1.7; white-space: pre-line; flex: 1; }

  .m-desc-wrap {
    position: relative; display: flex; align-items: flex-start; gap: 8px;
    padding-right: 4px;
  }
  .m-desc-edit {
    flex: 0 0 auto; align-self: flex-start;
    height: 28px; padding: 0 10px; font-size: 12px; font-weight: 600;
    background: #f0f0f0; color: #555; border: none; border-radius: 14px;
    cursor: pointer; transition: background .15s, color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .m-desc-edit:hover { background: #e0ecff; color: #0066cc; }
  .m-desc.edited::after {
    content: "已编辑"; display: inline-block; margin-left: 6px;
    background: #fff3cd; color: #8a6d3b; font-size: 10px;
    padding: 1px 6px; border-radius: 8px; vertical-align: middle;
  }

  .m-desc-editor textarea {
    width: 100%; min-height: 140px; max-height: 50vh; resize: vertical;
    box-sizing: border-box; padding: 10px 12px;
    font-family: inherit; font-size: 14px; line-height: 1.6;
    border: 1.5px solid #d0d0d0; border-radius: 8px;
    outline: none; transition: border-color .15s;
    background: #fafafa; color: #222;
  }
  .m-desc-editor textarea:focus { border-color: #0066cc; background: #fff; }
  .m-desc-bar {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; flex-wrap: wrap;
  }
  .m-desc-hint { font-size: 11px; color: #999; margin-right: auto; }
  .m-desc-btn {
    height: 32px; padding: 0 14px; font-size: 13px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: opacity .15s, background .15s;
  }
  .m-desc-btn.cancel { background: #eee; color: #555; }
  .m-desc-btn.cancel:hover { background: #ddd; }
  .m-desc-btn.reset { background: #fff3cd; color: #8a6d3b; }
  .m-desc-btn.reset:hover { background: #ffe699; }
  .m-desc-btn.save { background: #0066cc; color: #fff; }
  .m-desc-btn.save:hover { background: #0052a3; }
  .m-desc-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  #modal .m-actions { display: flex; gap: 8px; margin-top: 16px; }
  #modal .m-act-btn {
    flex: 1; padding: 9px 12px; border-radius: 8px;
    border: 1.5px solid #ddd; background: #fff;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-weight: 500;
  }
  #modal .m-act-btn:hover { border-color: #999; background: #f7f7f7; }
  #modal .m-act-btn.on-like { background: #ffe5ec; border-color: #ff3b6c; color: #d63060; }
  #modal .m-act-btn.on-hide { background: #f0f0f0; border-color: #666; color: #444; }
  /* 喜欢/隐藏 特殊 chip */
  .cat-chip.special { border-style: dashed; }
  .cat-chip.special-liked.active { background: #ff3b6c; border-color: #ff3b6c; color: #fff; }
  .cat-chip.special-hidden.active { background: #555; border-color: #555; color: #fff; }
  /* 侧栏 item 角标 */
  .item .item-flag {
    position: absolute; top: 4px; right: 6px; font-size: 12px;
    line-height: 1; pointer-events: none;
  }
  .item { position: relative; }
  .item.is-hidden { opacity: 0.6; }
  #modal-close {
    position: absolute; top: 10px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: white;
    border: none; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    z-index: 2; transition: background 0.15s;
  }
  #modal-close:hover { background: rgba(0,0,0,0.85); }

  @media (max-width: 640px) {
    #modal-mask { align-items: flex-end; }
    #modal {
      flex-direction: column; max-width: 100%; width: 100%;
      max-height: 92vh; border-radius: 18px 18px 0 0;
      animation: slideup 0.28s cubic-bezier(.2,.9,.3,1);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #modal .m-img-wrap { max-height: 42vh; min-height: 200px; flex: 0 0 auto; }
    #modal .m-body { padding: 16px 18px; }
    .m-nav-btn { width: 44px; height: 44px; font-size: 24px; }
    #modal-close { width: 40px; height: 40px; top: 12px; right: 12px; font-size: 20px; }
    .m-actions .m-action-btn, #modal .m-actions button { min-height: 44px; padding: 10px 14px; font-size: 14px; }
  }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* ===== 详情页 (全屏 list ↔ swipe overlay) ===== */
  #details-toggle {
    position: absolute; top: 68px; right: 12px; z-index: 1100;
    height: 36px; padding: 0 14px;
    background: #fff; color: #333; border: 1px solid #ddd;
    border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    cursor: pointer; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .15s, color .15s;
    user-select: none;
  }
  #details-toggle:hover { background: #f0f7ff; color: #0066cc; }
  #details-toggle.active { background: #0066cc; color: #fff; border-color: #0066cc; }
  @media (max-width: 768px), (pointer: coarse) and (max-width: 900px) {
    #details-toggle {
      right: 12px;
      top: calc(env(safe-area-inset-top) + 60px);
      height: 38px; font-size: 14px;
    }
  }

  #details-overlay {
    position: fixed; inset: 0; z-index: 9500;
    background: #f5f5f7; display: none;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #details-overlay.show { display: flex; animation: slideup .25s ease; }
  #details-header {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #e5e5e7; background: #fff;
    min-height: 52px;
  }
  #details-header .dh-title { font-size: 16px; font-weight: 700; color: #222; }
  #details-header .dh-sub { font-size: 11px; color: #888; margin-left: 8px; }
  #details-close {
    width: 40px; height: 40px; border: none; background: rgba(0,0,0,.06);
    border-radius: 50%; cursor: pointer; font-size: 18px; color: #333;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #details-close:hover { background: rgba(0,0,0,.12); }

  #details-list {
    flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0; display: none;
    overscroll-behavior: contain;
  }
  #details-overlay.view-list #details-list { display: block; }
  .dl-card {
    background: #fff; border-radius: 12px; margin: 0 0 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
    overflow: hidden; cursor: pointer;
    transition: transform .12s ease, box-shadow .15s;
    display: flex; min-height: 96px;
  }
  .dl-card:active { transform: scale(0.985); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .dl-card .dl-thumb {
    width: 96px; flex: 0 0 96px; height: 96px;
    background: #ececec center/cover no-repeat;
  }
  .dl-card .dl-body { padding: 10px 12px; flex: 1 1 auto; min-width: 0; }
  .dl-card .dl-name {
    font-size: 14px; font-weight: 700; color: #222;
    display: flex; align-items: center; gap: 6px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dl-card .dl-name .dl-id {
    flex: 0 0 auto; display: inline-block; padding: 1px 7px; border-radius: 10px;
    background: #f0f0f0; color: #666; font-size: 11px; font-weight: 600;
  }
  .dl-card .dl-meta { font-size: 12px; color: #888; margin-top: 4px; }
  .dl-card .dl-short { font-size: 12px; color: #555; margin-top: 4px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .dl-card.no-loc { opacity: 0.85; }
  .dl-card.no-loc .dl-name::after { content: "[无坐标]"; font-size: 10px; color: #999; font-weight: normal; margin-left: 4px; }

  /* swipe view: scroll-snap 上下分页 */
  #details-swipe {
    flex: 1 1 auto; overflow-y: scroll; -webkit-overflow-scrolling: touch;
    scroll-snap-type: y mandatory; scroll-behavior: smooth;
    display: none; overscroll-behavior: contain;
    scrollbar-width: none;
  }
  #details-swipe::-webkit-scrollbar { display: none; }
  #details-overlay.view-swipe #details-swipe { display: block; }
  .ds-page {
    height: 100%; min-height: 100%;
    scroll-snap-align: start; scroll-snap-stop: always;
    background: #fff; display: flex; flex-direction: column;
    box-shadow: 0 0 0 1px rgba(0,0,0,.03);
  }
  .ds-page .ds-img {
    flex: 0 0 auto; height: 48%; background: #000 center/contain no-repeat;
    position: relative;
  }
  .ds-page .ds-img-nav {
    position: absolute; bottom: 8px; right: 12px;
    background: rgba(0,0,0,0.5); color: #fff; font-size: 11px;
    padding: 3px 8px; border-radius: 10px; pointer-events: none;
  }
  .ds-page .ds-body { flex: 1 1 auto; padding: 16px 18px; overflow-y: auto; }
  .ds-page .ds-id {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    background: #333; color: #fff; font-size: 11px; font-weight: 700;
  }
  .ds-page .ds-title {
    font-size: 19px; font-weight: 700; margin: 8px 0 4px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .ds-page .ds-area { color: #2a73d9; font-size: 13px; }
  .ds-page .ds-short { color: #555; font-size: 13px; margin: 6px 0 12px; }

// 同坐标多家店 → 自动散开 ~20m 圆周排列，避免 marker 互相遮挡
const _dupMap = {};
restaurants.forEach(r => {
  if (r.lat == null) return;
  const k = r.lat.toFixed(5) + ',' + r.lng.toFixed(5);
  (_dupMap[k] = _dupMap[k] || []).push(r);
});
Object.values(_dupMap).forEach(arr => {
  if (arr.length <= 1) return;
  const R = 0.00020; // ~22m
  arr.forEach((r, i) => {
    const ang = (2 * Math.PI * i) / arr.length;
    r.lat += R * Math.cos(ang);
    r.lng += R * Math.sin(ang);
  });
});

function getCurrentDataset() {
  // 复用已有的 isVisible 逻辑 (含 隐藏/喜欢/分类筛选)
  if (typeof isVisible === 'function') return restaurants.filter(isVisible);
  return restaurants.slice();
}

function buildDetailsList() {
  // 详情入口统一: list 视图复用 sidebar 折叠分组 (已 move 进 details-list 容器)
  // 仅需重建 swipe 页面以反映最新筛选
  const data = getCurrentDataset();
  detailsSubEl.textContent = ' · 共 ' + data.length + ' 家';
  buildDetailsSwipe(data);
}

function buildDetailsSwipe(data) {
  detailsSwipeEl.innerHTML = '';
  swipePages = [];
  data.forEach((r, idx) => {
    const page = document.createElement('div');
    page.className = 'ds-page';
    page.dataset.idx = idx;
    page.dataset.id = r.id;
    const imgs = (r.imgs && r.imgs.length) ? r.imgs : (r.img ? [r.img] : []);
    const first = imgs[0] || '';
    const imgStyle = first ? `background-image:url('${first.replace(/'/g, "\\'")}')` : '';
    const navHtml = imgs.length > 1 ? `<div class="ds-img-nav">1 / ${imgs.length}</div>` : '';
    const descText = (typeof getDescFor === 'function') ? getDescFor(r) : (r.desc || '');
    const edited = (typeof isDescOverridden === 'function') && isDescOverridden(r);
    const isLiked = (typeof userState !== 'undefined') && userState.liked.has(r.id);
    const isHidden = (typeof userState !== 'undefined') && userState.hidden.has(r.id);
    page.innerHTML = `
      <div class="ds-img" style="${imgStyle}">${navHtml}</div>
      <div class="ds-body">
        <span class="ds-id">#${r.id}</span>
        <div class="ds-title">
          <span>${escapeHTML(r.name)}</span>
          <button class="copy-btn" data-copy="${escapeHTML(r.name)}" title="复制店名">📋 复制</button>
        </div>
        <div class="ds-area">📍 ${escapeHTML(r.area)} · ${escapeHTML(r.cat)}${r.lat == null ? ' · [无坐标]' : ''}</div>
        <div class="ds-short">${escapeHTML(r.short || '')}</div>
        <div class="ds-desc${edited ? ' edited' : ''}">${escapeHTML(descText)}</div>
        <div class="ds-actions">
          <button class="ds-act-btn ${isLiked ? 'on-like' : ''}" data-act="like">${isLiked ? '💔 取消喜欢' : '❤️ 喜欢'}</button>
          <button class="ds-act-btn ${isHidden ? 'on-hide' : ''}" data-act="hide">${isHidden ? '👁 取消隐藏' : '🙈 隐藏'}</button>
          <button class="ds-act-btn edit" data-act="edit">✏️ 编辑描述</button>
        </div>
        <div class="ds-hint">${idx + 1} / ${data.length} · 上下滑动切换 · ✕ 返回列表</div>
      </div>`;
    detailsSwipeEl.appendChild(page);
    swipePages.push(page);
  });
}

// 委托: 复制 / 喜欢 / 隐藏 / 编辑
detailsSwipeEl.addEventListener('click', (e) => {
  const copyBtn = e.target.closest('.copy-btn');
  if (copyBtn) {
    e.stopPropagation();
    copyToClipboard(copyBtn.getAttribute('data-copy'), copyBtn);
    return;
  }
  const actBtn = e.target.closest('.ds-act-btn');
  if (!actBtn) return;
  e.stopPropagation();
  const page = actBtn.closest('.ds-page');
  if (!page) return;
  const id = Number(page.dataset.id);
  const r = restaurants.find(x => x.id === id);
  if (!r) return;
  const act = actBtn.getAttribute('data-act');
  if (act === 'like') {
    toggleLike(id);
    refreshSwipePageActions(page, id);
  } else if (act === 'hide') {
    toggleHide(id);
    refreshSwipePageActions(page, id);
  } else if (act === 'edit') {
    // 调出 modal 编辑 desc (复用 modal 的编辑 UI)
    openModal(r);
    if (typeof enterDescEdit === 'function') setTimeout(() => enterDescEdit(r), 50);
  }
});

function refreshSwipePageActions(page, id) {
  const liked = userState.liked.has(id);
  const hidden = userState.hidden.has(id);
  const lb = page.querySelector('[data-act="like"]');
  const hb = page.querySelector('[data-act="hide"]');
  if (lb) { lb.className = 'ds-act-btn' + (liked ? ' on-like' : ''); lb.textContent = liked ? '💔 取消喜欢' : '❤️ 喜欢'; }
  if (hb) { hb.className = 'ds-act-btn' + (hidden ? ' on-hide' : ''); hb.textContent = hidden ? '👁 取消隐藏' : '🙈 隐藏'; }
}

function setDetailsView(v) {
  detailsView = v;
  detailsOverlay.classList.toggle('view-list', v === 'list');
  detailsOverlay.classList.toggle('view-swipe', v === 'swipe');
  if (v === 'list') {
    detailsTitleEl.textContent = '详情列表';
  } else {
    detailsTitleEl.textContent = '店铺详情';
  }
}

function enterSwipeView(idx) {
  setDetailsView('swipe');
  // 等 display 切换后再 scroll
  requestAnimationFrame(() => {
    const page = swipePages[idx];
    if (page) detailsSwipeEl.scrollTo({ top: page.offsetTop, behavior: 'auto' });
  });
}

function openDetails() {
  if (!detailsBuilt) { buildDetailsList(); detailsBuilt = true; }
  else { buildDetailsList(); } // 每次重建以反映最新筛选
  setDetailsView('list');
  detailsOverlay.classList.add('show');
  detailsToggle.classList.add('active');
  detailsToggle.innerHTML = '✕ 关闭';
}
function closeDetails() {
  detailsOverlay.classList.remove('show');
  detailsToggle.classList.remove('active');
  detailsToggle.innerHTML = '📋 详情页';
}
detailsToggle.addEventListener('click', () => {
  if (detailsOverlay.classList.contains('show')) closeDetails();
  else openDetails();
});
detailsClose.addEventListener('click', () => {
  if (detailsView === 'swipe') setDetailsView('list'); // swipe → 回 list
  else closeDetails(); // list → 关 overlay
});
// ESC 同上
document.addEventListener('keydown', (e) => {
  if (!detailsOverlay.classList.contains('show')) return;
  if (e.key === 'Escape') {
    if (detailsView === 'swipe') setDetailsView('list');
    else closeDetails();
  }
});

// tooltip 元素
const tooltip = document.getElementById('tooltip');
function showTooltip(r, x, y) {
  // 触摸设备禁用 hover tooltip (避免 tap 触发幽灵悬停)
  if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
  const imgHtml = r.img
    ? `<img src="${r.img}" alt="${r.name}" onerror="this.style.display='none'">`
    : `<div class="no-img">暂无图片</div>`;
  tooltip.innerHTML = `
    ${imgHtml}
    <div class="tt-body">
      <div class="tt-title">${r.id}. ${r.name}</div>
      <div class="tt-area">📍 ${r.area} · ${r.short}</div>
      <div class="tt-desc">${typeof getDescFor === 'function' ? getDescFor(r) : r.desc}</div>
    </div>`;
  tooltip.style.display = 'block';
  // 位置：靠右靠下，避免超出
  const pad = 14;
  const w = 260, h = tooltip.offsetHeight || 280;
  let nx = x + pad, ny = y + pad;
  if (nx + w > window.innerWidth - 10) nx = x - w - pad;
  if (ny + h > window.innerHeight - 10) ny = y - h - pad;
  tooltip.style.left = nx + 'px';
  tooltip.style.top = ny + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ===== desc 本地编辑 (per-id overrides 持久化) =====
const descOverrides = JSON.parse(localStorage.getItem('sr_desc_overrides') || '{}');
function saveDescOverrides() {
  localStorage.setItem('sr_desc_overrides', JSON.stringify(descOverrides));
}
function getDescFor(r) {
  const ov = descOverrides[r.id];
  return (ov != null) ? ov : (r.desc || '');
}
function isDescOverridden(r) {
  return descOverrides[r.id] != null;
}
function renderModalDesc(r) {
  mDesc.textContent = getDescFor(r);
  mDesc.classList.toggle('edited', isDescOverridden(r));
  // 退出编辑态
  mDescEditor.style.display = 'none';
  mDesc.style.display = '';
  mDescEdit.style.display = '';
  mDescReset.style.display = isDescOverridden(r) ? '' : 'none';
}
function enterDescEdit(r) {
  mDescTa.value = getDescFor(r);
  mDescEditor.style.display = '';
  mDesc.style.display = 'none';
  mDescEdit.style.display = 'none';
  mDescReset.style.display = isDescOverridden(r) ? '' : 'none';
  setTimeout(() => mDescTa.focus(), 0);
}
mDescEdit.addEventListener('click', () => {
  if (currentModalItem) enterDescEdit(currentModalItem);
});
mDescCancel.addEventListener('click', () => {
  if (currentModalItem) renderModalDesc(currentModalItem);
});
mDescSave.addEventListener('click', () => {
  if (!currentModalItem) return;
  const r = currentModalItem;
  const v = mDescTa.value;
  if (v === (r.desc || '')) {
    // 与原 desc 相同 → 视为清除 override
    delete descOverrides[r.id];
  } else {
    descOverrides[r.id] = v;
  }
  saveDescOverrides();
  renderModalDesc(r);
  syncSwipePageDesc(r.id);
});
mDescReset.addEventListener('click', () => {
  if (!currentModalItem) return;
  const r = currentModalItem;
  delete descOverrides[r.id];
  saveDescOverrides();
  renderModalDesc(r);
  syncSwipePageDesc(r.id);
});

let currentImgs = [];
let currentImgIdx = 0;

function renderModalImg() {
  if (!currentImgs.length) {
    mImgWrap.innerHTML = '<div class="no-img-big">暂无图片</div>';
    return;
  }
  const src = currentImgs[currentImgIdx];
  let html = `<img id="m-img" src="${src}" alt="">`;
  if (currentImgs.length > 1) {
    html += `<button class="m-nav-btn m-nav-prev" id="m-prev" aria-label="上一张">‹</button>`;
    html += `<button class="m-nav-btn m-nav-next" id="m-next" aria-label="下一张">›</button>`;
    html += `<div class="m-counter">${currentImgIdx + 1} / ${currentImgs.length}</div>`;
  }
  mImgWrap.innerHTML = html;
  const imgEl = document.getElementById('m-img');
  if (imgEl) {
    imgEl.onerror = () => {
      mImgWrap.innerHTML = '<div class="no-img-big">图片加载失败</div>';
    };
  }
  if (currentImgs.length > 1) {
    document.getElementById('m-prev').onclick = (e) => {
      e.stopPropagation();
      currentImgIdx = (currentImgIdx - 1 + currentImgs.length) % currentImgs.length;
      renderModalImg();
    };
    document.getElementById('m-next').onclick = (e) => {
      e.stopPropagation();
      currentImgIdx = (currentImgIdx + 1) % currentImgs.length;
      renderModalImg();
    };
  }
}

function openModal(r) {
  hideTooltip();
  currentModalItem = r;
  const color = r.cat === "酒店" ? "#4a6fa5" : r.cat === "景点" ? "#e67e22" : r.cat === "热门景区" ? "#ff3b30" : (catColor[r.cat] || areaColor[r.area] || "#555");
  mId.textContent = typeof r.id === "number" ? ("#" + r.id) : (r.id === "hotel" ? "🏨" : r.id === "namsan" ? "🗼" : r.id && r.id.startsWith("hs_") ? "⭐" : "★");
  mId.style.background = color;
  mTitle.textContent = r.name;
  const mCopy = document.getElementById('m-copy');
  if (mCopy) mCopy.onclick = () => copyToClipboard(r.name, mCopy);
  mArea.textContent = "📍 " + r.area;
  mShort.textContent = r.short;
  renderModalDesc(r);
  currentImgs = r.imgs && r.imgs.length ? r.imgs.slice() : (r.img ? [r.img] : []);
  currentImgIdx = 0;
  renderModalImg();
  renderModalActions();
  modalMask.classList.add('show');
  if (typeof maybeCollapseSheet === 'function') maybeCollapseSheet();
}
function closeModal() {
  modalMask.classList.remove('show');
  currentModalItem = null;
}
document.getElementById('modal-close').onclick = closeModal;
modalMask.addEventListener('click', (e) => {
  if (e.target === modalMask) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (!modalMask.classList.contains('show')) return;
  if (e.key === 'Escape') closeModal();
  else if (e.key === 'ArrowLeft' && currentImgs.length > 1) {
    currentImgIdx = (currentImgIdx - 1 + currentImgs.length) % currentImgs.length;
    renderModalImg();
  } else if (e.key === 'ArrowRight' && currentImgs.length > 1) {
    currentImgIdx = (currentImgIdx + 1) % currentImgs.length;
    renderModalImg();
  }
});

const areaOrder = ["明洞","圣水洞","弘大","梨泰院","汉南洞","新沙洞","北村","钟路","安岩洞","多分店","位置待确认"];
const groupEls = {};
const collapsedGroups = new Set(JSON.parse(localStorage.getItem('sr_collapsed') || '[]'));
function saveCollapsed() {
  localStorage.setItem('sr_collapsed', JSON.stringify([...collapsedGroups]));
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function copyToClipboard(text, btn) {
  const done = () => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1200);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallback());
  } else fallback();
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }
}
areaOrder.forEach(area => {
  if (!groups[area]) return;
  const g = document.createElement('div');
  g.className = 'group';
  if (collapsedGroups.has(area)) g.classList.add('collapsed');
  const label = area === "位置待确认" ? "❓ " + area : ("● " + area);
  const h3 = document.createElement('h3');
  h3.style.color = areaColor[area];
  h3.innerHTML = `<span>${label}</span><span class="gcount">${groups[area].length}</span>`;
  h3.addEventListener('click', () => {
    g.classList.toggle('collapsed');
    if (g.classList.contains('collapsed')) collapsedGroups.add(area);
    else collapsedGroups.delete(area);
    saveCollapsed();
  });
  g.appendChild(h3);
  groups[area].forEach(r => {
    const it = document.createElement('div');
    it.className = 'item';
    it.dataset.id = r.id;
    const dotColor = catColor[r.cat] || "#555";
    const noLoc = r.lat == null;

      const data = (typeof getCurrentDataset === 'function') ? getCurrentDataset() : restaurants;
      const idx = data.findIndex(d => d.id === r.id);
      if (idx >= 0 && typeof enterSwipeView === 'function') {
        enterSwipeView(idx);

      const rect = it.getBoundingClientRect();
      showTooltip(r, rect.left - 270, rect.top);

    it.addEventListener('mouseleave', hideTooltip);
    g.appendChild(it);
    sideItems[r.id] = it;
  });
  listEl.appendChild(g);
  groupEls[area] = g;
});

const userState = {
  liked: new Set(JSON.parse(localStorage.getItem('sr_liked') || '[]')),
  hidden: new Set(JSON.parse(localStorage.getItem('sr_hidden') || '[]'))
};
function saveUserState() {

  localStorage.setItem('sr_hidden', JSON.stringify([...userState.hidden]));
}
function toggleLike(id) {
  if (userState.liked.has(id)) userState.liked.delete(id);
  else { userState.liked.add(id); userState.hidden.delete(id); }
  saveUserState();

}

  if (userState.hidden.has(id)) userState.hidden.delete(id);
  else { userState.hidden.add(id); userState.liked.delete(id); }
  saveUserState();
  applyFilter();
  if (currentModalItem && currentModalItem.id === id) renderModalActions();
}

// ===== 类别筛选 =====
const SP_LIKED = '__liked__';
const SP_HIDDEN = '__hidden__';
const activeCats = new Set(categories.map(c => c.name)); // 默认全选 (不含特殊)
const topbar = document.getElementById('topbar');

function isVisible(r) {
  const hd = userState.hidden.has(r.id);
  if (activeCats.has(SP_HIDDEN)) return hd;      // 隐藏管理模式: 仅显示隐藏
  if (hd) return false;
  if (activeCats.has(r.cat)) return true;
  if (activeCats.has(SP_LIKED) && userState.liked.has(r.id)) return true;
  return false;
}

function renderChips() {
  topbar.querySelectorAll('.cat-chip').forEach(n => n.remove());

  // 全部
  const allOn = activeCats.size === categories.length && !activeCats.has(SP_HIDDEN) && !activeCats.has(SP_LIKED);
  const allChip = document.createElement('div');
  allChip.className = 'cat-chip all' + (allOn ? '' : ' inactive');
  const visibleCount = restaurants.filter(r => !userState.hidden.has(r.id)).length;
  allChip.innerHTML = `全部 <span class="cnt">${visibleCount}</span>`;
  allChip.onclick = () => {
    activeCats.delete(SP_HIDDEN);
    activeCats.delete(SP_LIKED);
    if (allOn) activeCats.clear();
    else categories.forEach(c => activeCats.add(c.name));
    applyFilter();
  };
  topbar.appendChild(allChip);

  // 各类别
  categories.forEach(c => {
    const count = restaurants.filter(r => r.cat === c.name && !userState.hidden.has(r.id)).length;
    const on = activeCats.has(c.name) && !activeCats.has(SP_HIDDEN);
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (on ? ' active' : '');
    chip.style.background = on ? c.color : '#fff';
    chip.style.color = on ? '#fff' : '#333';
    chip.innerHTML = `<img class="cat-img" src="${c.img}" alt="${c.name}"> ${c.name} <span class="cnt">${count}</span>`;
    chip.onclick = () => {
      activeCats.delete(SP_HIDDEN);
      if (activeCats.has(c.name)) activeCats.delete(c.name);
      else activeCats.add(c.name);
      applyFilter();
    };
    topbar.appendChild(chip);
  });

  // ❤️ 喜欢
  const likedCount = userState.liked.size;
  const likedOn = activeCats.has(SP_LIKED) && !activeCats.has(SP_HIDDEN);
  const likedChip = document.createElement('div');
  likedChip.className = 'cat-chip special special-liked' + (likedOn ? ' active' : '');
  if (!likedOn) { likedChip.style.background = '#fff'; likedChip.style.color = '#d63060'; }
  likedChip.innerHTML = `❤️ 喜欢 <span class="cnt">${likedCount}</span>`;
  likedChip.onclick = () => {
    activeCats.delete(SP_HIDDEN);
    if (activeCats.has(SP_LIKED)) activeCats.delete(SP_LIKED);
    else activeCats.add(SP_LIKED);
    applyFilter();
  };
  topbar.appendChild(likedChip);

  // 🙈 隐藏
  const hiddenCount = userState.hidden.size;
  const hiddenOn = activeCats.has(SP_HIDDEN);
  const hiddenChip = document.createElement('div');
  hiddenChip.className = 'cat-chip special special-hidden' + (hiddenOn ? ' active' : '');
  if (!hiddenOn) { hiddenChip.style.background = '#fff'; hiddenChip.style.color = '#555'; }
  hiddenChip.innerHTML = `🙈 隐藏 <span class="cnt">${hiddenCount}</span>`;
  hiddenChip.onclick = () => {
    if (activeCats.has(SP_HIDDEN)) activeCats.delete(SP_HIDDEN);
    else activeCats.add(SP_HIDDEN);
    applyFilter();
  };
  topbar.appendChild(hiddenChip);
}

function applyFilter() {
  // marker
  restaurants.forEach(r => {
    const m = markers[r.id];
    if (!m) return;
    const vis = isVisible(r);
    if (vis) { if (!map.hasLayer(m)) m.addTo(map); }
    else { if (map.hasLayer(m)) map.removeLayer(m); }
  });
  // 侧栏
  Object.keys(groupEls).forEach(area => {
    let anyVisible = false;
    groups[area].forEach(r => {
      const it = sideItems[r.id];
      const vis = isVisible(r);
      it.style.display = vis ? '' : 'none';
      const flagEl = it.querySelector('.item-flag');
      if (flagEl) {
        const lk = userState.liked.has(r.id);
        const hd = userState.hidden.has(r.id);
        flagEl.textContent = hd ? '🙈' : (lk ? '❤️' : '');
      }
      it.classList.toggle('is-hidden', userState.hidden.has(r.id));
      if (vis) anyVisible = true;
    });
    groupEls[area].style.display = anyVisible ? '' : 'none';
  });
  renderChips();
}

renderChips();
applyFilter();

// 自适应
const allLatLng = [...hotspots, ...restaurants.filter(r => r.lat != null), hotel, namsan].map(p => [p.lat, p.lng]);
map.fitBounds(allLatLng, { padding: [40, 40] });
